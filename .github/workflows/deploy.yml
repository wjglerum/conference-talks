name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Resolve GitHub Pages URL
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          url=$(gh api "repos/$GITHUB_REPOSITORY/pages" --jq '.html_url')
          base=$(echo "$url" | sed -E 's|(https?://[^/]+).*|\1|')
          path=$(echo "$url" | sed -E 's|https?://[^/]+||')
          [ -z "$path" ] && path=/
          echo "SITE_URL=$base" >> "$GITHUB_ENV"
          echo "SITE_PATH=$path" >> "$GITHUB_ENV"

      - name: Build static site
        env:
          QUARKUS_ROQ_GENERATOR_BATCH: 'true'
        run: |
          ./mvnw -B package quarkus:run -DskipTests \
            -Dquarkus.http.root-path=$SITE_PATH \
            -Dsite.url=$SITE_URL \
            -Dsite.future=true

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: target/roq

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
