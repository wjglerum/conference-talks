<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{#if page.title}{page.title} | {/if}{site.title}</title>
    <meta name="description" content="{site.description}">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; line-height: 1.6; }
        header { background: #1e293b; border-bottom: 1px solid #334155; padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; }
        header h1 { font-size: 1.25rem; color: #f8fafc; }
        header h1 a { color: inherit; text-decoration: none; }
        header span { color: #64748b; font-size: 0.875rem; }
        main { max-width: 900px; margin: 0 auto; padding: 2rem; }
        .hero { text-align: center; padding: 3rem 0 2rem; }
        .hero h2 { font-size: 2rem; color: #f8fafc; margin-bottom: 0.5rem; }
        .hero p { color: #94a3b8; font-size: 1.1rem; }
        .stats { display: flex; justify-content: center; gap: 2rem; margin: 2rem 0; }
        .stat { text-align: center; }
        .stat .number { font-size: 2rem; font-weight: 700; color: #6366f1; }
        .stat .label { color: #94a3b8; font-size: 0.875rem; }
        .talks-grid { display: grid; gap: 1rem; }
        .talk-card { background: #1e293b; border: 1px solid #334155; border-radius: 0.75rem; padding: 1.5rem; text-decoration: none; color: inherit; display: block; transition: border-color 0.2s, transform 0.2s; }
        .talk-card:hover { border-color: #6366f1; transform: translateY(-2px); }
        .talk-card .conference { color: #6366f1; font-size: 0.875rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
        .talk-card h3 { color: #f8fafc; font-size: 1.1rem; margin-bottom: 0.5rem; }
        .talk-card .meta { display: flex; gap: 1rem; color: #64748b; font-size: 0.875rem; flex-wrap: wrap; margin-top: 0.75rem; }
        .talk-card .meta span::before { margin-right: 0.25rem; }
        .tag { display: inline-block; background: #1e3a5f; color: #93c5fd; border-radius: 0.25rem; padding: 0.125rem 0.5rem; font-size: 0.75rem; margin-right: 0.25rem; }
        .tag.workshop { background: #3d1f6b; color: #c4b5fd; }
        footer { text-align: center; padding: 2rem; color: #475569; font-size: 0.875rem; border-top: 1px solid #1e293b; margin-top: 3rem; }
    </style>
</head>
<body>
    <header>
        <h1><a href="/">Willem Jan Glerum</a></h1>
        <span>Conference Talks</span>
    </header>
    <main>
        {#insert /}
    </main>
    <footer>Built with <a href="https://quarkus.io" style="color:#6366f1">Quarkus</a> + <a href="https://github.com/quarkiverse/quarkus-roq" style="color:#6366f1">Roq</a></footer>
</body>
</html>
